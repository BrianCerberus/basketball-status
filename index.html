<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#667eea" />
  <title>Basketball Status</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      margin: 0;
      padding: 12px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      min-height: -webkit-fill-available;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    html {
      height: -webkit-fill-available;
    }
    .card {
      background: #ffffff;
      border-radius: 20px;
      padding: 24px 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 400px;
      width: 100%;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 5px;
      background: linear-gradient(90deg, #667eea, #764ba2);
    }
    .icon {
      font-size: 56px;
      margin-bottom: 12px;
      display: block;
    }
    .card h2 {
      margin: 0 0 16px 0;
      font-size: 22px;
      color: #1a1a2e;
      font-weight: 700;
    }
    .info-row {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding: 10px 12px;
      margin: 6px 0;
      background: #f8f9fa;
      border-radius: 10px;
      font-size: 14px;
      color: #333;
    }
    .info-row .emoji {
      font-size: 18px;
      margin-right: 10px;
      min-width: 22px;
      flex-shrink: 0;
    }
    .info-row .label {
      color: #666;
      margin-right: 6px;
      white-space: nowrap;
    }
    .info-row .value {
      font-weight: 600;
      color: #1a1a2e;
      word-break: break-word;
    }
    .time-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin: 6px 0;
    }
    .time-grid .info-row {
      margin: 0;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 10px 8px;
    }
    .time-grid .info-row .emoji {
      margin-right: 0;
      margin-bottom: 4px;
    }
    .time-grid .info-row .label {
      margin-right: 0;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .time-grid .info-row .value {
      font-size: 15px;
      margin-top: 2px;
    }
    .duration-row {
      background: linear-gradient(135deg, #e8f5e9, #c8e6c9);
      border: 1px solid #a5d6a7;
    }
    .game-on .card::before {
      background: linear-gradient(90deg, #4CAF50, #8BC34A);
    }
    .game-on .icon { animation: bounce 1s ease infinite; }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    .no-game .card::before {
      background: linear-gradient(90deg, #ff9800, #ffc107);
    }
    .next-game {
      margin-top: 20px;
      padding-top: 16px;
      border-top: 2px dashed #e0e0e0;
    }
    .next-game-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #888;
      margin-bottom: 10px;
      font-weight: 600;
    }
    .next-game .info-row {
      background: #fff8e1;
    }
    .next-game .time-grid .info-row {
      background: #fff8e1;
    }
    .error .card::before {
      background: linear-gradient(90deg, #f44336, #e91e63);
    }
    .loading .card {
      color: #666;
    }
    .loading .icon {
      animation: spin 1.5s linear infinite;
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .subtitle {
      color: #666;
      font-size: 14px;
      margin-top: 6px;
    }
    .action-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 16px;
      justify-content: center;
    }
    .action-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition: transform 0.15s, box-shadow 0.15s;
      min-height: 44px;
      flex: 1;
      min-width: 140px;
    }
    .action-btn:active {
      transform: scale(0.97);
    }
    .action-btn.maps {
      background: linear-gradient(135deg, #4285f4, #34a853);
      color: white;
    }
    .action-btn.calendar {
      background: linear-gradient(135deg, #ea4335, #fbbc05);
      color: white;
    }
    .action-btn.subscribe {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
    }
    .subscribe-section {
      margin-top: 20px;
      padding-top: 16px;
      border-top: 2px dashed #e0e0e0;
    }
    .subscribe-section .section-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #888;
      margin-bottom: 10px;
      font-weight: 600;
    }
    .weather-row {
      background: linear-gradient(135deg, #e3f2fd, #bbdefb);
      border: 1px solid #90caf9;
    }
    .weather-row .value {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .weather-icon {
      font-size: 20px;
    }
    .weather-details {
      font-size: 11px;
      color: #666;
      font-weight: normal;
    }
    .attendance-section {
      margin-top: 16px;
      padding: 14px 16px;
      background: linear-gradient(135deg, #e8eaf6, #c5cae9);
      border-radius: 12px;
      border: 1px solid #9fa8da;
    }
    .attendance-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .attendance-stats {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .attendance-stats .count-number {
      font-size: 28px;
      font-weight: 800;
      color: #3f51b5;
      line-height: 1;
    }
    .attendance-stats .count-label {
      font-size: 12px;
      color: #555;
      line-height: 1.3;
    }
    .attendance-stats .live-dot {
      width: 8px;
      height: 8px;
      background: #4CAF50;
      border-radius: 50%;
      animation: pulse-dot 1.5s ease-in-out infinite;
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }
    .attend-btn {
      padding: 10px 18px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: transform 0.15s, background 0.3s;
      min-height: 44px;
      white-space: nowrap;
    }
    .attend-btn:active {
      transform: scale(0.97);
    }
    .attend-btn.attend {
      background: linear-gradient(135deg, #4CAF50, #66BB6A);
      color: white;
    }
    .attend-btn.unattend {
      background: linear-gradient(135deg, #ef5350, #e53935);
      color: white;
    }
    .attendance-note {
      font-size: 11px;
      color: #777;
      margin-top: 8px;
      text-align: center;
    }
    @media (max-width: 360px) {
      .card {
        padding: 20px 16px;
      }
      .action-btn {
        min-width: 120px;
        padding: 10px 12px;
        font-size: 12px;
      }
      .info-row {
        font-size: 13px;
        padding: 8px 10px;
      }
      .attend-btn {
        padding: 8px 14px;
        font-size: 12px;
      }
      .attendance-stats .count-number {
        font-size: 24px;
      }
    }
  </style>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
</head>
<body>
  <div class="loading" id="wrapper">
    <div class="card" id="status">
      <span class="icon">&#x1F504;</span>
      <h2>Checking Schedule...</h2>
      <p class="subtitle">Loading basketball status</p>
    </div>
  </div>

  <script>
    const calendarId =
      "6b2ffcbd02ff052bd40ff5e2ed7c01082c2017740b3c044a55088cf02f3f4972@group.calendar.google.com";

    // Note: This API key is restricted to Calendar API and your GitHub Pages domain only
    const apiKey = "AIzaSyCOx2fmGOLBiVTCIpd06hTKb-Vx-bSi68g";

    const tz = "America/Toronto";

    // Detect iOS for Apple Maps vs Google Maps
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || 
                  (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

    // Helper: Generate maps URL (Apple Maps for iOS, Google Maps otherwise)
    function getMapsUrl(location) {
      if (!location) return null;
      const encoded = encodeURIComponent(location);
      if (isIOS) {
        return "maps://maps.apple.com/?q=" + encoded;
      }
      return "https://www.google.com/maps/search/?api=1&query=" + encoded;
    }

    // Helper: Generate ICS file content for calendar event
    function generateICS(event) {
      const title = event.summary || "Basketball Game";
      const location = event.location || "";
      const description = event.description || "";
      
      function formatICSDate(dateStr) {
        const d = new Date(dateStr);
        return d.toISOString().replace(/[-:]/g, '').split('.')[0] + 'Z';
      }
      
      let dtStart, dtEnd;
      if (event.start.dateTime) {
        dtStart = formatICSDate(event.start.dateTime);
        dtEnd = formatICSDate(event.end.dateTime);
      } else {
        dtStart = event.start.date.replace(/-/g, '');
        dtEnd = event.end.date.replace(/-/g, '');
      }
      
      const uid = dtStart + "-" + Math.random().toString(36).substr(2, 9) + "@basketball";
      
      const lines = [
        'BEGIN:VCALENDAR',
        'VERSION:2.0',
        'PRODID:-//Basketball Status//EN',
        'CALSCALE:GREGORIAN',
        'METHOD:PUBLISH',
        'BEGIN:VEVENT',
        'UID:' + uid,
        'DTSTAMP:' + formatICSDate(new Date().toISOString()),
        event.start.dateTime ? 'DTSTART:' + dtStart : 'DTSTART;VALUE=DATE:' + dtStart,
        event.start.dateTime ? 'DTEND:' + dtEnd : 'DTEND;VALUE=DATE:' + dtEnd,
        'SUMMARY:' + title,
        location ? 'LOCATION:' + location : '',
        description ? 'DESCRIPTION:' + description.replace(/\n/g, '\\n') : '',
        'END:VEVENT',
        'END:VCALENDAR'
      ].filter(function(line) { return line; });
      
      return lines.join('\r\n');
    }

    // Helper: Download ICS file
    function downloadICS(event) {
      const ics = generateICS(event);
      const blob = new Blob([ics], { type: 'text/calendar;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = 'basketball-game.ics';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);
    }

    // Get subscribe URL for the calendar
    function getSubscribeUrl(useHttps) {
      const base = useHttps ? "https" : "webcal";
      return base + "://calendar.google.com/calendar/ical/" + encodeURIComponent(calendarId) + "/public/basic.ics";
    }

    // Detect Safari browser
    const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);

    // Handle subscribe button click - Safari needs special handling
    function handleSubscribe(e) {
      e.preventDefault();
      
      // Try webcal:// first
      const webcalUrl = getSubscribeUrl(false);
      
      if (isSafari) {
        // Safari: use window.location for webcal://
        window.location.href = webcalUrl;
      } else {
        // Other browsers: try opening webcal URL
        window.location.href = webcalUrl;
      }
    }

    // Copy calendar URL to clipboard (fallback option)
    function copyCalendarUrl() {
      const httpsUrl = getSubscribeUrl(true);
      navigator.clipboard.writeText(httpsUrl).then(function() {
        alert('Calendar URL copied!\n\nPaste this URL in your calendar app to subscribe:\n' + httpsUrl);
      }).catch(function() {
        prompt('Copy this URL to subscribe in your calendar app:', httpsUrl);
      });
    }

    // Weather code to emoji and description mapping
    const weatherCodes = {
      0: { icon: '☀️', desc: 'Clear sky' },
      1: { icon: '🌤️', desc: 'Mainly clear' },
      2: { icon: '⛅', desc: 'Partly cloudy' },
      3: { icon: '☁️', desc: 'Overcast' },
      45: { icon: '🌫️', desc: 'Foggy' },
      48: { icon: '🌫️', desc: 'Icy fog' },
      51: { icon: '🌧️', desc: 'Light drizzle' },
      53: { icon: '🌧️', desc: 'Drizzle' },
      55: { icon: '🌧️', desc: 'Heavy drizzle' },
      56: { icon: '🌨️', desc: 'Freezing drizzle' },
      57: { icon: '🌨️', desc: 'Heavy freezing drizzle' },
      61: { icon: '🌧️', desc: 'Light rain' },
      63: { icon: '🌧️', desc: 'Rain' },
      65: { icon: '🌧️', desc: 'Heavy rain' },
      66: { icon: '🌨️', desc: 'Freezing rain' },
      67: { icon: '🌨️', desc: 'Heavy freezing rain' },
      71: { icon: '🌨️', desc: 'Light snow' },
      73: { icon: '🌨️', desc: 'Snow' },
      75: { icon: '❄️', desc: 'Heavy snow' },
      77: { icon: '🌨️', desc: 'Snow grains' },
      80: { icon: '🌧️', desc: 'Light showers' },
      81: { icon: '🌧️', desc: 'Showers' },
      82: { icon: '⛈️', desc: 'Heavy showers' },
      85: { icon: '🌨️', desc: 'Light snow showers' },
      86: { icon: '🌨️', desc: 'Snow showers' },
      95: { icon: '⛈️', desc: 'Thunderstorm' },
      96: { icon: '⛈️', desc: 'Thunderstorm with hail' },
      99: { icon: '⛈️', desc: 'Severe thunderstorm' }
    };

    // Fetch weather for game time (using Open-Meteo API - free, no key required)
    async function getWeatherForGame(event) {
      try {
        // Get location from event
        const locationStr = event.location;
        if (!locationStr) return null;
        
        // Geocode the location using Nominatim (OpenStreetMap) - free, no key required
        const geocodeUrl = "https://nominatim.openstreetmap.org/search" +
          "?q=" + encodeURIComponent(locationStr) +
          "&format=json" +
          "&limit=1";
        
        const geocodeResponse = await fetch(geocodeUrl, {
          headers: {
            'User-Agent': 'BasketballStatus/1.0'
          }
        });
        
        if (!geocodeResponse.ok) return null;
        const geocodeData = await geocodeResponse.json();
        
        if (!geocodeData || geocodeData.length === 0) return null;
        
        const lat = parseFloat(geocodeData[0].lat);
        const lon = parseFloat(geocodeData[0].lon);
        
        // Get the game start time
        const gameTime = event.start.dateTime ? new Date(event.start.dateTime) : new Date(event.start.date);
        const today = new Date();
        
        // Only fetch weather if game is within 7 days (forecast limit)
        const daysUntil = Math.ceil((gameTime - today) / (1000 * 60 * 60 * 24));
        if (daysUntil > 7 || daysUntil < 0) {
          return null;
        }
        
        const dateStr = gameTime.toISOString().split('T')[0];
        const hour = gameTime.getHours();
        
        const weatherUrl = "https://api.open-meteo.com/v1/forecast" +
          "?latitude=" + lat +
          "&longitude=" + lon +
          "&hourly=temperature_2m,weather_code,precipitation_probability" +
          "&timezone=America/Toronto" +
          "&start_date=" + dateStr +
          "&end_date=" + dateStr;
        
        const response = await fetch(weatherUrl);
        if (!response.ok) return null;
        
        const data = await response.json();
        
        // Find the hour closest to game time
        const hourIndex = Math.min(hour, 23);
        const temp = Math.round(data.hourly.temperature_2m[hourIndex]);
        const code = data.hourly.weather_code[hourIndex];
        const precipProb = data.hourly.precipitation_probability[hourIndex];
        
        const weather = weatherCodes[code] || { icon: '🌡️', desc: 'Unknown' };
        
        return {
          temp: temp,
          icon: weather.icon,
          desc: weather.desc,
          precipProb: precipProb
        };
      } catch (err) {
        console.error("Weather fetch error:", err);
        return null;
      }
    }

    // Helper: Check if event is basketball-related
    function isBasketballEvent(event) {
      const title = (event.summary || "").toLowerCase();
      return title.includes("basketball") || 
             title.includes("game") || 
             title.includes("tuesday game");
    }

    // Helper: Format time from event
    function formatTime(event) {
      if (event.start.dateTime) {
        return new Date(event.start.dateTime).toLocaleTimeString("en-CA", {
          hour: "numeric",
          minute: "2-digit",
          hour12: true
        });
      }
      return "All day";
    }

    // Helper: Format end time from event
    function formatEndTime(event) {
      if (event.end.dateTime) {
        return new Date(event.end.dateTime).toLocaleTimeString("en-CA", {
          hour: "numeric",
          minute: "2-digit",
          hour12: true
        });
      }
      return "All day";
    }

    // Helper: Calculate duration
    function getDuration(event) {
      if (event.start.dateTime && event.end.dateTime) {
        const start = new Date(event.start.dateTime);
        const end = new Date(event.end.dateTime);
        const diffMs = end - start;
        const diffMins = Math.round(diffMs / 60000);
        
        if (diffMins < 60) {
          return diffMins + " min";
        }
        
        const hours = Math.floor(diffMins / 60);
        const mins = diffMins % 60;
        
        if (mins === 0) {
          return hours + (hours === 1 ? " hour" : " hours");
        }
        return hours + "h " + mins + "m";
      }
      return "All day";
    }

    // Helper: Format date for display
    function formatDate(event) {
      const dateStr = event.start.dateTime || event.start.date;
      const date = new Date(dateStr);
      const today = new Date();
      const tomorrow = new Date(today);
      tomorrow.setDate(tomorrow.getDate() + 1);

      if (date.toDateString() === today.toDateString()) {
        return "Today";
      } else if (date.toDateString() === tomorrow.toDateString()) {
        return "Tomorrow";
      }
      
      return date.toLocaleDateString("en-CA", {
        weekday: "long",
        month: "short",
        day: "numeric"
      });
    }

    // Helper: Get days until event
    function getDaysUntil(event) {
      const dateStr = event.start.dateTime || event.start.date;
      const eventDate = new Date(dateStr);
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      eventDate.setHours(0, 0, 0, 0);
      const diffTime = eventDate - today;
      return Math.ceil(diffTime / (1000 * 60 * 60 * 24));
    }

    // Build API URL
    function buildUrl(startDate, endDate) {
      return "https://www.googleapis.com/calendar/v3/calendars/" + encodeURIComponent(calendarId) + "/events" +
        "?key=" + apiKey +
        "&timeMin=" + startDate.toISOString() +
        "&timeMax=" + endDate.toISOString() +
        "&singleEvents=true" +
        "&orderBy=startTime" +
        "&timeZone=" + encodeURIComponent(tz);
    }

    // Store current game for ICS download
    let currentGame = null;

    function downloadCurrentGameICS() {
      if (currentGame) {
        downloadICS(currentGame);
      }
    }

    // Render game info rows with action buttons
    function renderGameInfo(game, showDate, weather) {
      const startTime = formatTime(game);
      const endTime = formatEndTime(game);
      const duration = getDuration(game);
      const location = game.location || "Location TBD";
      const title = game.summary || "Basketball Game";
      const mapsUrl = getMapsUrl(game.location);
      const mapsLabel = isIOS ? "Apple Maps" : "Google Maps";
      
      let html = '';
      
      if (showDate) {
        const dateDisplay = formatDate(game);
        html += '<div class="info-row">' +
          '<span class="emoji">&#x1F4C5;</span>' +
          '<span class="label">Date:</span>' +
          '<span class="value">' + dateDisplay + '</span>' +
          '</div>';
      }
      
      html += '<div class="info-row">' +
        '<span class="emoji">&#x1F4CB;</span>' +
        '<span class="label">Event:</span>' +
        '<span class="value">' + title + '</span>' +
        '</div>';
      
      // Time grid: Start, End, Duration
      html += '<div class="time-grid">' +
        '<div class="info-row">' +
        '<span class="emoji">&#x25B6;&#xFE0F;</span>' +
        '<span class="label">Start</span>' +
        '<span class="value">' + startTime + '</span>' +
        '</div>' +
        '<div class="info-row">' +
        '<span class="emoji">&#x23F9;&#xFE0F;</span>' +
        '<span class="label">End</span>' +
        '<span class="value">' + endTime + '</span>' +
        '</div>' +
        '</div>' +
        '<div class="info-row duration-row">' +
        '<span class="emoji">&#x23F1;&#xFE0F;</span>' +
        '<span class="label">Duration:</span>' +
        '<span class="value">' + duration + '</span>' +
        '</div>';
      
      html += '<div class="info-row">' +
        '<span class="emoji">&#x1F4CD;</span>' +
        '<span class="label">Location:</span>' +
        '<span class="value">' + location + '</span>' +
        '</div>';
      
      // Add weather row if available
      if (weather) {
        html += '<div class="info-row weather-row">' +
          '<span class="emoji">&#x1F321;&#xFE0F;</span>' +
          '<span class="label">Weather:</span>' +
          '<span class="value">' +
          '<span class="weather-icon">' + weather.icon + '</span>' +
          '<span>' + weather.temp + '°C ' + weather.desc + '</span>' +
          '<span class="weather-details">(' + weather.precipProb + '% precip)</span>' +
          '</span>' +
          '</div>';
      }
      
      html += '<div class="action-buttons">';
      
      if (mapsUrl) {
        html += '<a href="' + mapsUrl + '" target="_blank" class="action-btn maps">&#x1F5FA;&#xFE0F; ' + mapsLabel + '</a>';
      }
      html += '<button onclick="downloadCurrentGameICS()" class="action-btn calendar">&#x1F4C5; Add to Calendar</button>' +
        '</div>';
      
      return html;
    }

    // Render subscribe section
    function renderSubscribeSection() {
      const hint = isIOS ? "For IOS users: Open in Chrome first" : "Works with most calendar apps";
      return '<div class="subscribe-section">' +
        '<div class="section-label">Stay Updated</div>' +
        '<div class="action-buttons">' +
        '<a href="#" onclick="handleSubscribe(event)" class="action-btn subscribe">&#x1F4F2; Subscribe to Calendar</a>' +
        '</div>' +
        '<p class="subtitle" style="margin-top: 12px; font-size: 12px;">' + hint + '</p>' +
        '<button onclick="copyCalendarUrl()" style="margin-top: 8px; background: none; border: none; color: #667eea; font-size: 12px; cursor: pointer; text-decoration: underline;">Copy calendar URL instead</button>' +
        '</div>';
    }

    // ========== Attendance System ==========
    // Uses localStorage to prevent duplicate RSVPs per device.
    // Uses Firebase Realtime Database for shared real-time counts.
    // Each game gets its own attendance bucket (keyed by event ID),
    // so stats are automatically separated per game session.

    // Firebase config — fill in to enable shared real-time attendance.
    // Without this, attendance works in local-only mode (per device).
    // Setup: https://console.firebase.google.com/ → Create project →
    //   Realtime Database → Create Database → Project Settings → Web app config
    // Suggested security rules for the database:
    //   { "rules": { "attendance": { ".read": true, ".write": true } } }
    const firebaseConfig = {
      apiKey: "AIzaSyDOzd7ni9fCX8k98bgoYciOE54lf6_7CZc",
      authDomain: "basketball-status.firebaseapp.com",
      databaseURL: "https://basketball-status-default-rtdb.firebaseio.com",
      projectId: "basketball-status",
      storageBucket: "basketball-status.firebasestorage.app",
      messagingSenderId: "151829221282",
      appId: "1:151829221282:web:005eba36909d77352dacfb"
    };

    let firebaseReady = false;
    let attendanceListener = null;
    let currentGameId = null;

    function initFirebase() {
      if (firebaseConfig.databaseURL) {
        try {
          firebase.initializeApp(firebaseConfig);
          firebaseReady = true;
        } catch (e) {
          console.warn("Firebase init failed:", e);
        }
      }
    }

    // Stable per-device ID stored in localStorage
    function getDeviceId() {
      let id = localStorage.getItem('bball_device_id');
      if (!id) {
        id = 'dev_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem('bball_device_id', id);
      }
      return id;
    }

    function hasRSVP(gameId) {
      return localStorage.getItem('bball_rsvp_' + gameId) === 'true';
    }

    function setRSVP(gameId, attending) {
      if (attending) {
        localStorage.setItem('bball_rsvp_' + gameId, 'true');
      } else {
        localStorage.removeItem('bball_rsvp_' + gameId);
      }
    }

    // Remove RSVP entries for old games so localStorage stays clean
    function cleanupOldRSVPs(currentId) {
      var keys = Object.keys(localStorage);
      for (var i = 0; i < keys.length; i++) {
        if (keys[i].indexOf('bball_rsvp_') === 0 && keys[i] !== 'bball_rsvp_' + currentId) {
          localStorage.removeItem(keys[i]);
        }
      }
    }

    // Firebase keys cannot contain . # $ / [ ]
    function sanitizeKey(id) {
      return id.replace(/[.#$/\[\]]/g, '_');
    }

    function setupAttendance(gameId) {
      if (attendanceListener && firebaseReady) {
        attendanceListener.off();
      }

      currentGameId = gameId;
      cleanupOldRSVPs(gameId);

      var isAttending = hasRSVP(gameId);
      updateAttendButton(isAttending);

      if (firebaseReady) {
        var gameKey = sanitizeKey(gameId);
        attendanceListener = firebase.database().ref('attendance/' + gameKey);

        // Real-time listener — count = number of device entries
        attendanceListener.on('value', function(snapshot) {
          var devices = snapshot.val() || {};
          var count = Object.keys(devices).length;
          updateAttendanceCount(count);
        });

        // Sync localStorage ↔ Firebase on load
        var deviceId = getDeviceId();
        attendanceListener.child(deviceId).once('value', function(snapshot) {
          var inFirebase = snapshot.val() === true;
          if (isAttending && !inFirebase) {
            attendanceListener.child(deviceId).set(true);
          } else if (!isAttending && inFirebase) {
            attendanceListener.child(deviceId).remove();
          }
        });
      } else {
        updateAttendanceCount(isAttending ? 1 : 0);
      }
    }

    function toggleAttendance() {
      if (!currentGameId) return;

      var newStatus = !hasRSVP(currentGameId);
      setRSVP(currentGameId, newStatus);
      updateAttendButton(newStatus);

      if (firebaseReady) {
        var gameKey = sanitizeKey(currentGameId);
        var deviceId = getDeviceId();
        var deviceRef = firebase.database().ref('attendance/' + gameKey + '/' + deviceId);

        if (newStatus) {
          deviceRef.set(true);
        } else {
          deviceRef.remove();
        }
      } else {
        updateAttendanceCount(newStatus ? 1 : 0);
      }
    }

    function updateAttendButton(isAttending) {
      var btn = document.getElementById('attend-btn');
      if (!btn) return;
      if (isAttending) {
        btn.className = 'attend-btn unattend';
        btn.textContent = "\u270B I won't attend";
      } else {
        btn.className = 'attend-btn attend';
        btn.textContent = '\uD83D\uDE4B I will attend';
      }
    }

    function updateAttendanceCount(count) {
      var el = document.getElementById('attendance-count');
      if (el) el.textContent = count;
      var label = document.getElementById('attendance-label');
      if (label) label.textContent = count === 1 ? 'person attending' : 'people attending';
    }

    function renderAttendanceSection(gameId) {
      var isAttending = hasRSVP(gameId);
      var btnClass = isAttending ? 'unattend' : 'attend';
      var btnText = isAttending ? "\u270B I won't attend" : '\uD83D\uDE4B I will attend';

      return '<div class="attendance-section">' +
        '<div class="attendance-header">' +
        '<div class="attendance-stats">' +
        '<span class="live-dot"></span>' +
        '<span class="count-number" id="attendance-count">0</span>' +
        '<span class="count-label" id="attendance-label">people attending</span>' +
        '</div>' +
        '<button id="attend-btn" class="attend-btn ' + btnClass + '" onclick="toggleAttendance()">' + btnText + '</button>' +
        '</div>' +
        (!firebaseReady ? '<div class="attendance-note">Local mode \u2014 configure Firebase for shared real-time counts</div>' : '') +
        '</div>';
    }

    initFirebase();
    // ========== End Attendance System ==========

    async function checkBasketballStatus() {
      const wrapper = document.getElementById("wrapper");
      const el = document.getElementById("status");

      try {
        const todayStart = new Date();
        todayStart.setHours(0, 0, 0, 0);
        const todayEnd = new Date();
        todayEnd.setHours(23, 59, 59, 999);

        const todayResponse = await fetch(buildUrl(todayStart, todayEnd));
        if (!todayResponse.ok) throw new Error("HTTP " + todayResponse.status);
        const todayData = await todayResponse.json();
        
        if (todayData.error) {
          throw new Error(todayData.error.message || "Calendar API error");
        }

        const todayGames = (todayData.items || []).filter(isBasketballEvent);

        wrapper.classList.remove("loading");

        if (todayGames.length > 0) {
          const game = todayGames[0];
          currentGame = game;
          
          // Fetch weather for game time
          const weather = await getWeatherForGame(game);
          
          wrapper.classList.add("game-on");
          el.innerHTML = '<span class="icon">&#x1F3C0;</span>' +
            '<h2>Game Tonight!</h2>' +
            renderGameInfo(game, false, weather) +
            renderAttendanceSection(game.id) +
            renderSubscribeSection();
          setupAttendance(game.id);
        } else {
          const futureStart = new Date();
          futureStart.setDate(futureStart.getDate() + 1);
          futureStart.setHours(0, 0, 0, 0);
          
          const futureEnd = new Date();
          futureEnd.setDate(futureEnd.getDate() + 60);

          const futureResponse = await fetch(buildUrl(futureStart, futureEnd));
          if (!futureResponse.ok) throw new Error("HTTP " + futureResponse.status);
          const futureData = await futureResponse.json();

          const upcomingGames = (futureData.items || []).filter(isBasketballEvent);

          wrapper.classList.add("no-game");

          if (upcomingGames.length > 0) {
            const nextGame = upcomingGames[0];
            currentGame = nextGame;
            const daysUntil = getDaysUntil(nextGame);
            const daysText = daysUntil === 1 ? "1 day" : daysUntil + " days";
            
            // Fetch weather for upcoming game (if within 7 days)
            const weather = await getWeatherForGame(nextGame);

            el.innerHTML = '<span class="icon">&#x1F634;</span>' +
              '<h2>No Game Today</h2>' +
              '<p class="subtitle">Next game in ' + daysText + '</p>' +
              '<div class="next-game">' +
              '<div class="next-game-label">Upcoming Game</div>' +
              renderGameInfo(nextGame, true, weather) +
              '</div>' +
              renderAttendanceSection(nextGame.id) +
              renderSubscribeSection();
            setupAttendance(nextGame.id);
          } else {
            el.innerHTML = '<span class="icon">&#x1F4ED;</span>' +
              '<h2>No Games Scheduled</h2>' +
              '<p class="subtitle">No upcoming games found in the next 60 days</p>' +
              renderSubscribeSection();
          }
        }
      } catch (err) {
        wrapper.classList.remove("loading");
        wrapper.classList.add("error");
        el.innerHTML = '<span class="icon">&#x26A0;&#xFE0F;</span>' +
          '<h2>Unable to Load</h2>' +
          '<p class="subtitle">Could not fetch calendar data.<br>Please try again later.</p>';
        console.error("Calendar fetch error:", err);
      }
    }

    checkBasketballStatus();
  </script>
</body>
</html>
